name: DevSecKit Scan
on: [push, pull_request]
jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.x
      - name: Install Tools
        run: pip install semgrep bandit safety pip-audit
      - name: Run SAST
        run: semgrep --config p/ci .
      - name: Run SCA
        run: pip-audit
