<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>DevSecKit Demo</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');

    :root {
      --bg: #070a12;
      --panel: #0d1222;
      --border: #202a45;
      --text: #c8d3e7;
      --muted: #8893a8;
      --running: #4ade80;
      --vuln: #ef4444;
      --other: #b58cff;
      --cmd: #f59e0b;
      --prompt-r: #ef4444;
      --prompt-y: #f59e0b;
      --prompt-g: #22c55e;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      padding: 24px;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at 15% 0%, #131b33, #070a12 50%);
      color: var(--text);
      font-family: "Share Tech Mono", ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    }

    .terminal {
      width: min(1200px, 100%);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      background: #020611;
      box-shadow: 0 24px 55px rgba(0, 0, 0, 0.45);
    }

    .bar {
      height: 44px;
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 0 14px;
      border-bottom: 1px solid var(--border);
      background: var(--panel);
      color: var(--muted);
    }

    .dot { width: 12px; height: 12px; border-radius: 999px; }
    .r { background: #fb5f57; }
    .y { background: #fbbd2d; }
    .g { background: #28c840; }

    .screen {
      min-height: 75vh;
      max-height: 75vh;
      overflow: auto;
      padding: 6px 18px 18px 18px;
      line-height: 1.48;
      white-space: normal;
    }
    #logs { margin: 0; padding: 0; }

    .line { color: var(--text); white-space: pre-wrap; margin: 0 0 2px 0; }
    .muted { color: var(--muted); }
    .running { color: var(--running); }
    .vuln { color: var(--vuln); }
    .other { color: var(--other); }
    .cmd { color: var(--cmd); font-weight: 700; }

    .input-line {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 0;
    }

    .prompt {
      min-width: 42px;
      font-weight: 700;
    }
    .prompt .p1 { color: var(--prompt-r); }
    .prompt .p2 { color: var(--prompt-y); }
    .prompt .p3 { color: var(--prompt-g); }

    .input {
      border: 0;
      outline: 0;
      width: 100%;
      background: transparent;
      color: var(--cmd);
      font: inherit;
      caret-color: var(--cmd);
    }

    a { color: #9fb7ff; text-decoration: none; }
  </style>
</head>
<body>
  <div class="terminal">
    <div class="bar">
      <span class="dot r"></span><span class="dot y"></span><span class="dot g"></span>
      <span>DevSecKit Demo Terminal</span>
    </div>
    <div class="screen" id="screen">
      <div id="logs"></div>
      <div class="input-line">
        <span class="prompt"><span class="p1">&gt;</span><span class="p2">&gt;</span><span class="p3">&gt;</span></span>
        <input id="cmd" class="input" autocomplete="off" spellcheck="false" placeholder="devsec" />
      </div>
    </div>
  </div>

  <script>
    const logs = document.getElementById('logs');
    const screen = document.getElementById('screen');
    const cmd = document.getElementById('cmd');
    let running = false;
    let animateLogs = false;
    let logQueue = Promise.resolve();
    let awaitingGitChoice = false;
    let selectedRepo = '';
    const repoOptions = {
      '1': 'https://github.com/juice-shop/juice-shop',
      '2': 'https://github.com/WebGoat/WebGoat',
      '3': 'https://github.com/digininja/DVWA',
      '4': 'https://github.com/OWASP/NodeGoat',
    };
    const repoProfiles = {
      '1': {
        name: 'juice-shop',
        targetDir: './juice-shop',
        files: '412',
        loc: '86,210',
        deps: '192',
        summary: { critical: 2, high: 7, medium: 6, low: 1, duration: '03:11' },
        top: ['Hardcoded JWT secret', 'NoSQL injection in login API', 'Prototype pollution package', 'Missing CSP header'],
        sast: [
          { type: 'NoSQL Injection', file: 'server/routes/login.ts', line: '101', code: "User.findOne({ email: req.body.email, password: req.body.password })", sev: 'HIGH', cwe: 'CWE-943' },
          { type: 'Cross-Site Scripting', file: 'frontend/src/app/search.component.ts', line: '56', code: 'innerHTML = userQuery', sev: 'MEDIUM', cwe: 'CWE-79' },
        ],
        sca: [
          { pkg: 'lodash', ver: '4.17.15', vuln: 'Prototype Pollution', sev: 'HIGH', cve: 'CVE-2020-8203' },
          { pkg: 'jsonwebtoken', ver: '8.5.1', vuln: 'Insecure token validation', sev: 'MEDIUM', cve: 'CVE-2022-23540' },
        ],
        secrets: [
          { type: 'JWT Secret', file: 'config/default.yml', line: '34', value: 'jwt.secret: "dev-secret-key"', sev: 'CRITICAL' },
          { type: 'SMTP Password', file: 'docker/.env', line: '12', value: 'SMTP_PASSWORD=welcome123', sev: 'HIGH' },
        ],
        iac: [
          { file: 'docker-compose.yml', issue: 'Database exposed publicly', resource: 'ports: "0.0.0.0:27017:27017"', sev: 'HIGH' },
          { file: 'Dockerfile', issue: 'Running container as root', resource: '', sev: 'MEDIUM' },
        ],
        dast: [
          { test: 'NoSQL injection test', endpoint: '/rest/user/login', payload: '{"email":{"$ne":null},"password":{"$ne":null}}', result: 'Authentication bypass detected', sev: 'HIGH' },
          { test: 'XSS payload test', endpoint: '/#/search?q=', payload: '<script>alert(1)<\\/script>', result: 'Payload reflected in search view', sev: 'MEDIUM' },
        ],
        iast: [
          { type: 'Injection sink reached', location: '/rest/user/login', trace: 'request body -> query object -> Mongo driver', sev: 'HIGH' },
        ],
      },
      '2': {
        name: 'WebGoat',
        targetDir: './WebGoat',
        files: '539',
        loc: '112,904',
        deps: '211',
        summary: { critical: 1, high: 6, medium: 8, low: 2, duration: '04:08' },
        top: ['Hardcoded DB password', 'SQL Injection in lesson endpoint', 'Unsafe deserialization', 'Public admin actuator path'],
        sast: [
          { type: 'SQL Injection', file: 'src/main/java/org/owasp/webgoat/lessons/sql/SqlLesson.java', line: '93', code: 'statement.executeQuery(query + userInput)', sev: 'HIGH', cwe: 'CWE-89' },
          { type: 'Unsafe Deserialization', file: 'src/main/java/org/owasp/webgoat/lessons/deserialization/PayloadController.java', line: '44', code: 'new ObjectInputStream(request.getInputStream())', sev: 'HIGH', cwe: 'CWE-502' },
        ],
        sca: [
          { pkg: 'spring-security-web', ver: '5.7.4', vuln: 'Authorization bypass', sev: 'HIGH', cve: 'CVE-2023-34035' },
          { pkg: 'snakeyaml', ver: '1.30', vuln: 'Arbitrary code execution risk', sev: 'MEDIUM', cve: 'CVE-2022-1471' },
        ],
        secrets: [
          { type: 'Database Password', file: 'src/main/resources/application.properties', line: '21', value: 'spring.datasource.password=webgoat', sev: 'HIGH' },
          { type: 'Signing Key', file: 'src/main/resources/jwt.properties', line: '4', value: 'jwt.signing.key=changeit', sev: 'CRITICAL' },
        ],
        iac: [
          { file: 'docker-compose.yml', issue: 'Container privileged mode enabled', resource: 'privileged: true', sev: 'HIGH' },
          { file: 'Dockerfile', issue: 'No HEALTHCHECK defined', resource: '', sev: 'MEDIUM' },
        ],
        dast: [
          { test: 'SQL injection test', endpoint: '/WebGoat/SqlInjection/attack', payload: "' OR '1'='1", result: 'Query manipulation confirmed', sev: 'HIGH' },
          { test: 'Directory traversal test', endpoint: '/WebGoat/FileUpload/download', payload: '../../etc/passwd', result: 'Path traversal response observed', sev: 'MEDIUM' },
        ],
        iast: [
          { type: 'Unsafe SQL construction', location: '/SqlInjection/attack', trace: 'HTTP param -> string concat -> JDBC execute', sev: 'HIGH' },
        ],
      },
      '3': {
        name: 'DVWA',
        targetDir: './DVWA',
        files: '87',
        loc: '14,090',
        deps: '43',
        summary: { critical: 1, high: 4, medium: 4, low: 1, duration: '02:02' },
        top: ['Default admin password', 'SQL Injection in vulnerable page', 'Reflected XSS path', 'Insecure PHP config'],
        sast: [
          { type: 'SQL Injection', file: 'vulnerabilities/sqli/source/low.php', line: '12', code: '$query = "SELECT * FROM users WHERE user_id = $id";', sev: 'HIGH', cwe: 'CWE-89' },
          { type: 'Reflected XSS', file: 'vulnerabilities/xss_r/source/low.php', line: '8', code: "echo '<pre>Hello ' . $_GET['name'] . '</pre>'; ", sev: 'MEDIUM', cwe: 'CWE-79' },
        ],
        sca: [
          { pkg: 'php', ver: '7.4.x', vuln: 'Multiple security issues', sev: 'HIGH', cve: 'CVE-2024-4577' },
          { pkg: 'mysql-client', ver: '8.0.28', vuln: 'Privilege escalation', sev: 'MEDIUM', cve: 'CVE-2023-21980' },
        ],
        secrets: [
          { type: 'Default Credential', file: 'config/config.inc.php', line: '23', value: "$DVWA['default_security_level'] = 'low';", sev: 'HIGH' },
          { type: 'Database Password', file: 'config/config.inc.php', line: '13', value: "$DVWA['db_password'] = 'p@ssw0rd';", sev: 'CRITICAL' },
        ],
        iac: [
          { file: 'docker-compose.yml', issue: 'MySQL root password in plaintext', resource: 'MYSQL_ROOT_PASSWORD=password', sev: 'HIGH' },
          { file: 'Dockerfile', issue: 'Container user not specified', resource: '', sev: 'MEDIUM' },
        ],
        dast: [
          { test: 'SQL injection test', endpoint: '/vulnerabilities/sqli/', payload: '1 OR 1=1', result: 'Dumped user table records', sev: 'HIGH' },
          { test: 'XSS payload test', endpoint: '/vulnerabilities/xss_r/', payload: '<script>alert(1)<\\/script>', result: 'Payload reflected in HTML', sev: 'MEDIUM' },
        ],
        iast: [
          { type: 'Unsanitized parameter flow', location: '/vulnerabilities/sqli/', trace: 'GET id -> SQL query string -> MySQL', sev: 'HIGH' },
        ],
      },
      '4': {
        name: 'NodeGoat',
        targetDir: './NodeGoat',
        files: '128',
        loc: '21,443',
        deps: '54',
        summary: { critical: 1, high: 5, medium: 3, low: 0, duration: '02:14' },
        top: ['Hardcoded AWS Access Key', 'SQL Injection vulnerability', 'Prototype pollution dependency', 'Public S3 bucket configuration'],
        sast: [
          { type: 'SQL Injection', file: 'app/routes/user.js', line: '87', code: 'db.query("SELECT * FROM users WHERE id=" + userInput)', sev: 'HIGH', cwe: 'CWE-89' },
          { type: 'Cross-Site Scripting', file: 'views/profile.ejs', line: '42', code: '<%= userInput %>', sev: 'MEDIUM', cwe: 'CWE-79' },
        ],
        sca: [
          { pkg: 'lodash', ver: '4.17.10', vuln: 'Prototype Pollution', sev: 'HIGH', cve: 'CVE-2019-10744' },
          { pkg: 'express', ver: '4.15.0', vuln: 'Denial of Service', sev: 'MEDIUM', cve: 'CVE-2019-5413' },
        ],
        secrets: [
          { type: 'AWS Access Key', file: 'config/config.js', line: '12', value: 'AKIAIOSFODNN7EXAMPLE', sev: 'CRITICAL' },
          { type: 'Database Password', file: 'config/db.js', line: '7', value: 'password = "admin123"', sev: 'HIGH' },
        ],
        iac: [
          { file: 'terraform/main.tf', issue: 'Public S3 bucket enabled', resource: 'aws_s3_bucket.logs | acl = "public-read"', sev: 'HIGH' },
          { file: 'Dockerfile', issue: 'Running container as root', resource: '', sev: 'MEDIUM' },
        ],
        dast: [
          { test: 'SQL injection test', endpoint: '/login', payload: "' OR '1'='1", result: 'Authentication bypass detected', sev: 'HIGH' },
          { test: 'XSS payload test', endpoint: '/search', payload: '<script>alert(1)<\\/script>', result: 'Payload reflected', sev: 'MEDIUM' },
        ],
        iast: [
          { type: 'SQL Injection', location: '/login endpoint', trace: 'User input -> query builder -> database', sev: 'HIGH' },
        ],
      },
    };

    function line(text, cls='line') {
      const append = () => {
        const el = document.createElement('div');
        el.className = `line ${cls}`;
        el.textContent = text;
        logs.appendChild(el);
        screen.scrollTop = screen.scrollHeight;
      };
      if (!animateLogs) {
        append();
        return logQueue;
      }
      const delay = 18 + Math.floor(Math.random() * 42);
      logQueue = logQueue.then(() => new Promise((resolve) => {
        setTimeout(() => {
          append();
          resolve();
        }, delay);
      }));
      return logQueue;
    }

    function wait(ms) { return new Promise((r) => setTimeout(r, ms)); }

    function prelude() {
      logs.innerHTML = '';
      line('DevSecKit - Terminal DevSecOps Scanner', 'other');
      line('Demo URL: https://imharshitaa.github.io/DevSecKit/demo/', 'muted');
      line('Project: https://github.com/imharshitaa/DevSecKit', 'muted');
      line('Run command: devsec', 'muted');
      line('Sample Inputs (Git URLs):', 'muted');
      line('  - https://github.com/juice-shop/juice-shop', 'muted');
      line('  - https://github.com/WebGoat/WebGoat', 'muted');
      line('  - https://github.com/digininja/DVWA', 'muted');
      line('  - https://github.com/OWASP/NodeGoat', 'muted');
      line('Type devsec and press Enter to run demo logs.', 'muted');
    }

    async function runDevsec() {
      line('>>> devsec', 'cmd');
      line('>>> choose which git to scan: [1] https://github.com/juice-shop/juice-shop [2] https://github.com/WebGoat/WebGoat [3] https://github.com/digininja/DVWA [4] https://github.com/OWASP/NodeGoat', 'cmd');
      awaitingGitChoice = true;
    }

    function section(title) {
      line('--------------------------------------------------------------------------------', 'other');
      line(title, 'other');
      line('--------------------------------------------------------------------------------', 'other');
    }

    function blank() { line(''); }

    async function runDevsecWithChoice(choice) {
      animateLogs = true;
      logQueue = Promise.resolve();
      selectedRepo = repoOptions[choice];
      const p = repoProfiles[choice];
      line(`>>> ${choice}`, 'cmd');
      line(`Selected: ${selectedRepo}`, 'other');
      blank();

      line('================================================================================', 'other');
      line('DEVSECOPS SECURITY PIPELINE', 'other');
      line(`Target Directory: ${p.targetDir}`, 'other');
      line('Scan Start Time: 2026-03-08 21:44:01', 'other');
      line('Modules: SAST | SCA | Secrets | IaC | DAST | IAST', 'other');
      line('================================================================================', 'other');
      blank();

      line('[INIT] Loading security engines...', 'running');
      line('[INIT] Rules loaded: 2,143', 'running');
      line('[INIT] Dependency database updated', 'running');
      line('[INIT] Secret detection patterns loaded', 'running');
      line('[INIT] Infrastructure scanning enabled', 'running');
      blank();

      section('[SAST] STATIC APPLICATION SECURITY TESTING');
      line('[SAST] Analyzing JavaScript source files...', 'running');
      blank();
      line(`[INFO] Files analyzed: ${p.files}`, 'other');
      line(`[INFO] Lines of code: ${p.loc}`, 'other');
      blank();
      for (const f of p.sast) {
        line('[VULNERABILITY DETECTED]', 'vuln');
        line(`Type: ${f.type}`, 'vuln');
        line(`File: ${f.file}`, 'vuln');
        line(`Line: ${f.line}`, 'vuln');
        line('Code:', 'vuln');
        line(f.code, 'vuln');
        line(`Severity: ${f.sev}`, 'vuln');
        line(`CWE: ${f.cwe}`, 'vuln');
        blank();
      }
      line('[SAST] Completed', 'running');
      line(`Findings: ${p.sast.length}`, 'running');
      blank();

      section('[SCA] SOFTWARE COMPOSITION ANALYSIS');
      line('[SCA] Analyzing dependencies...', 'running');
      blank();
      line(`[INFO] Dependencies detected: ${p.deps}`, 'other');
      blank();
      for (const d of p.sca) {
        line('[VULNERABLE PACKAGE]', 'vuln');
        line(`Package: ${d.pkg}`, 'vuln');
        line(`Version: ${d.ver}`, 'vuln');
        line(`Vulnerability: ${d.vuln}`, 'vuln');
        line(`Severity: ${d.sev}`, 'vuln');
        line(`CVE: ${d.cve}`, 'vuln');
        blank();
      }
      line('[SCA] Completed', 'running');
      line(`Vulnerable dependencies: ${p.sca.length}`, 'running');
      blank();

      section('[SECRETS] SECRET DETECTION');
      line('[SCAN] Searching for exposed credentials...', 'running');
      blank();
      for (const s of p.secrets) {
        line('[SECRET DETECTED]', 'vuln');
        line(`Type: ${s.type}`, 'vuln');
        line(`File: ${s.file}`, 'vuln');
        line(`Line: ${s.line}`, 'vuln');
        line(`Value: ${s.value}`, 'vuln');
        line(`Severity: ${s.sev}`, 'vuln');
        blank();
      }
      line('[SECRETS] Completed', 'running');
      line(`Secrets detected: ${p.secrets.length}`, 'running');
      blank();

      section('[IAC] INFRASTRUCTURE AS CODE SCAN');
      line('[IAC] Scanning Terraform and Docker configurations...', 'running');
      blank();
      for (const i of p.iac) {
        line('[VULNERABILITY DETECTED]', 'vuln');
        line(`File: ${i.file}`, 'vuln');
        line(`Issue: ${i.issue}`, 'vuln');
        if (i.resource) line(`Resource: ${i.resource}`, 'vuln');
        line(`Severity: ${i.sev}`, 'vuln');
        blank();
      }
      line('[IAC] Completed', 'running');
      line(`Issues found: ${p.iac.length}`, 'running');
      blank();

      section('[DAST] DYNAMIC APPLICATION SECURITY TESTING');
      line('[DAST] Starting web scanner', 'running');
      line('Target: http://localhost:3000', 'other');
      blank();
      for (const d of p.dast) {
        line(`[TEST] ${d.test}`, 'running');
        line(`Endpoint: ${d.endpoint}`, 'other');
        line(`Payload: ${d.payload}`, 'other');
        line(`Result: ${d.result}`, 'vuln');
        line(`Severity: ${d.sev}`, 'vuln');
        blank();
      }
      line('[DAST] Completed', 'running');
      line(`Vulnerabilities detected: ${p.dast.length}`, 'running');
      blank();

      section('[IAST] INTERACTIVE APPLICATION SECURITY TESTING');
      line('[IAST] Instrumenting application runtime...', 'running');
      line('[IAST] Monitoring database queries...', 'running');
      blank();
      for (const i of p.iast) {
        line('[VULNERABILITY DETECTED]', 'vuln');
        line(`Type: ${i.type}`, 'vuln');
        line(`Location: ${i.location}`, 'vuln');
        line('Runtime Trace:', 'vuln');
        line(i.trace, 'vuln');
        line(`Severity: ${i.sev}`, 'vuln');
        blank();
      }
      line('[IAST] Completed', 'running');
      line(`Issues detected: ${p.iast.length}`, 'running');
      blank();

      section('SCAN SUMMARY');
      line(`Target: ${p.name}`, 'other');
      line(`Total Files Scanned: ${p.files}`, 'other');
      line(`Dependencies Analyzed: ${p.deps}`, 'other');
      blank();
      line('Findings:', 'other');
      blank();
      line(`CRITICAL: ${p.summary.critical}`, 'vuln');
      line(`HIGH: ${p.summary.high}`, 'vuln');
      line(`MEDIUM: ${p.summary.medium}`, 'vuln');
      line(`LOW: ${p.summary.low}`, 'vuln');
      blank();
      line('Top Issues:', 'other');
      for (const t of p.top) line(` - ${t}`, 'other');
      blank();
      line(`Scan Duration: ${p.summary.duration}`, 'other');
      line('Pipeline Status: FAILED (security issues detected)', 'vuln');
      blank();
      line('================================================================================', 'other');
      line('END OF SECURITY REPORT', 'other');
      line('================================================================================', 'other');
      blank();
      await logQueue;
      animateLogs = false;
    }

    cmd.addEventListener('keydown', async (e) => {
      if (e.key !== 'Enter' || running) return;
      const value = cmd.value.trim();
      cmd.value = '';
      if (!value) return;
      if (awaitingGitChoice) {
        if (!repoOptions[value]) {
          line(`>>> ${value}`, 'cmd');
          line('Invalid option. Choose 1, 2, 3, or 4.', 'other');
          return;
        }
        running = true;
        awaitingGitChoice = false;
        await runDevsecWithChoice(value);
        running = false;
        return;
      }
      if (value !== 'devsec') {
        line(`>>> ${value}`, 'cmd');
        line('Unknown command. Use: devsec', 'other');
        line('');
        return;
      }
      running = true;
      await runDevsec();
      running = false;
    });

    prelude();
  </script>
</body>
</html>
